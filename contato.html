<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevShop - Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">DevShop</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Início</a></li>
                    <li><a href="produtos.html">Produtos</a></li>
                    <li><a href="contato.html" class="active">Contato</a></li>
                    <li><a href="carrinho.html">Carrinho 🛒</a></li>
                    <li><a href="historico.html">Meus Pedidos</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container content">
        <h2 class="section-title" style="text-align: center;">Fale Conosco</h2>
        
        <div style="max-width: 600px; margin: 0 auto;">
            <form class="contact-form" onsubmit="event.preventDefault(); alert('Mensagem enviada com sucesso!'); this.reset();">
                <div class="form-group">
                    <label>Seu Nome</label>
                    <input type="text" required>
                </div>
                <div class="form-group">
                    <label>E-mail de Contato</label>
                    <input type="email" required>
                </div>
                <div class="form-group">
                    <label>Mensagem</label>
                    <textarea rows="5" required></textarea>
                </div>
                <button type="submit" class="btn-buy">Enviar Mensagem</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
