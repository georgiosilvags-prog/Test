<body>

    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">DevShop</a>

                <ul class="nav-links">
                    <li><a href="index.html">Início</a></li>

    </header>

    <main class="container content" style="max-width: 600px;">
        <h2 class="section-title" style="text-align: center;">Fale Conosco</h2>
        
        <form class="contact-form" onsubmit="event.preventDefault(); mostrarNotificacao('Mensagem enviada com sucesso! Responderemos em breve.'); this.reset();">
            <div class="form-group">
                <label for="name">Nome Completo</label>
                <input type="text" id="name" required placeholder="Como se chama?">
            </div>
            <div class="form-group">
                <label for="email">E-mail de Contato</label>
                <input type="email" id="email" required placeholder="seuemail@exemplo.com">
            </div>
            <div class="form-group">
                <label for="message">Mensagem ou Dúvida</label>
                <textarea id="message" rows="5" required placeholder="Como podemos ajudar a sua experiência operacional?"></textarea>
            </div>
            <button type="submit" class="btn-buy" style="width: 100%;">Enviar Mensagem</button>
        </form>
    </main>
