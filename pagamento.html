<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevShop - Pagamento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">DevShop</a>
        </div>
    </header>

    <main class="container content">
        <h2 class="section-title">Finalizar Compra</h2>
        
        <div class="payment-layout">
            <form class="contact-form" onsubmit="processarPagamento(event)">
                <h3 style="margin-bottom: 15px;">1. Dados de Entrega</h3>
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" required>
                </div>
                <div class="form-group">
                    <label>Endereço de Entrega</label>
                    <input type="text" required>
                </div>

                <h3 style="margin-top: 20px; margin-bottom: 15px;">2. Método de Pagamento</h3>
                <div class="payment-methods-grid">
                    <label class="method-option">
                        <input type="radio" name="metodo_pagamento" value="pix" checked onclick="alternarMetodoPagamento('pix')">
                        <div class="method-box">
                            <span class="method-icon">📱</span><span>Pix</span>
                        </div>
                    </label>
                    <label class="method-option">
                        <input type="radio" name="metodo_pagamento" value="cartao" onclick="alternarMetodoPagamento('cartao')">
                        <div class="method-box">
                            <span class="method-icon">💳</span><span>Cartão</span>
                        </div>
                    </label>
                    <label class="method-option">
                        <input type="radio" name="metodo_pagamento" value="boleto" onclick="alternarMetodoPagamento('boleto')">
                        <div class="method-box">
                            <span class="method-icon">📄</span><span>Boleto</span>
                        </div>
                    </label>
                </div>

                <div id="area-pix" style="background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                    <p style="font-size: 0.9rem;">O código Copia e Cola do PIX será gerado após o envio.</p>
                </div>
                <div id="area-cartao" style="display:none; background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                    <div class="form-group"><label>Número do Cartão</label><input type="text"></div>
                </div>
                <div id="area-boleto" style="display:none; background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                    <p style="font-size: 0.9rem;">O boleto bancário será enviado por e-mail.</p>
                </div>

                <button type="submit" class="btn-buy" style="margin-top: 15px;">Confirmar e Pagar</button>
            </form>

            <div class="contact-form">
                <h3 style="margin-bottom: 15px; border-bottom: 1px solid #cbd5e1; padding-bottom: 8px;">Resumo do Pedido</h3>
                <div id="resumo-itens-pagamento" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;"></div>
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; border-top: 1px solid #cbd5e1; padding-top: 10px;">
                    <span>Total:</span>
                    <span id="total-pagamento" style="color: #4f46e5;">R$ 0,00</span>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
